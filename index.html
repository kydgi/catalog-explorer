<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KY DGI Catalog Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Dosis', sans-serif;
            background: #1f2937;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: #111827;
            border-bottom: 2px solid #00a651;
            padding: 0 24px;
            z-index: 1000;
            position: relative;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0 10px;
            border-bottom: 1px solid #374151;
        }

        .brand-badge {
            background: #00a651;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
        .brand-title { font-size: 16px; font-weight: 700; color: #f3f4f6; }
        .brand-subtitle { font-size: 13px; font-weight: 400; color: #9ca3af; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            flex-wrap: wrap;
        }

        .coord-group { display: flex; align-items: center; gap: 6px; }

        .coord-group label {
            font-size: 13px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .coord-group input {
            background: #1f2937;
            border: 1px solid #374151;
            color: #f3f4f6;
            font-family: 'Dosis', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 4px;
            width: 180px;
            outline: none;
            transition: border-color 0.2s;
        }

        .coord-group input:focus { border-color: #00a651; }
        .separator { color: #4b5563; font-size: 18px; }

        #submit-btn {
            background: #00a651;
            color: #fff;
            border: none;
            font-family: 'Dosis', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 7px 20px;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        #submit-btn:hover   { background: #047857; }
        #submit-btn:active  { background: #064e3b; }
        #submit-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

        #clear-history-btn {
            background: transparent;
            color: #6b7280;
            border: 1px solid #374151;
            font-family: 'Dosis', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #clear-history-btn:hover { color: #f87171; border-color: #f87171; }

        #download-geojson-btn {
            background: transparent;
            color: #6b7280;
            border: 1px solid #374151;
            font-family: 'Dosis', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #download-geojson-btn:hover { color: #60a5fa; border-color: #60a5fa; }

        /* ── Map ── */
        #map {
            width: 100%;
            height: 320px;
            cursor: crosshair;
            flex-shrink: 0;
        }

        #map-resize-handle {
            width: 100%;
            height: 6px;
            background: #374151;
            cursor: ns-resize;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        #map-resize-handle:hover,
        #map-resize-handle.dragging { background: #00a651; }

        #map-resize-handle::after {
            content: '';
            width: 32px;
            height: 2px;
            background: currentColor;
            border-radius: 1px;
            opacity: 0.5;
        }

        .map-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17,24,39,0.85);
            color: #9ca3af;
            font-family: 'Dosis', sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 10px;
            pointer-events: none;
            z-index: 500;
            white-space: nowrap;
        }

        /* ── Status bar ── */
        #status-bar {
            background: #0d1117;
            border-bottom: 1px solid #374151;
            padding: 8px 24px;
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
            position: relative;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #374151;
            border-top-color: #00a651;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Main content ── */
        main { flex: 1; padding: 24px; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .section-title { font-size: 16px; font-weight: 700; color: #f3f4f6; }

        .count-badge {
            background: #374151;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }

        section + section { margin-top: 36px; }

        /* ── Card grid ── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s, transform 0.15s;
        }

        .card:hover {
            border-color: #00a651;
            transform: translateY(-2px);
        }

        .card-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #1e293b;
            display: block;
        }

        .card-thumb-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 28px;
        }

        .card-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: #f3f4f6;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 11px;
            color: #6b7280;
            word-break: break-all;
            line-height: 1.4;
        }

        .card-collection {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0.4px;
            align-self: flex-start;
        }

        .tag-laz     { background: #064e3b; color: #34d399; }
        .tag-dem     { background: #1e3a5f; color: #60a5fa; }
        .tag-oblique { background: #4a1942; color: #f0abfc; }

        .card-attrs { display: flex; flex-direction: column; gap: 4px; }

        .attr-row { display: flex; justify-content: space-between; gap: 8px; }

        .attr-label {
            color: #6b7280;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            white-space: nowrap;
        }

        .attr-value {
            color: #d1d5db;
            font-weight: 600;
            font-size: 12px;
            text-align: right;
            word-break: break-all;
        }

        /* ── Download links ── */
        .card-downloads {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid #374151;
        }

        .dl-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #1f2937;
            border: 1px solid #374151;
            color: #60a5fa;
            font-family: 'Dosis', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: background 0.15s, border-color 0.15s;
        }

        .dl-link:hover { background: #1e3a5f; border-color: #60a5fa; }

        /* ── Empty / error ── */
        .empty-state { color: #6b7280; font-size: 14px; padding: 20px 0; }

        /* ── Debug section ── */
        .debug-section {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 2px solid #374151;
        }

        .debug-section .section-header { margin-bottom: 12px; }

        .debug-panel {
            background: #0d1117;
            border: 1px solid #374151;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .debug-panel > summary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            color: #9ca3af;
            background: #111827;
            border-bottom: 1px solid #374151;
            list-style: none;
            user-select: none;
        }

        .debug-panel > summary::-webkit-details-marker { display: none; }
        .debug-panel > summary::before {
            content: '▶';
            font-size: 10px;
            color: #4b5563;
            transition: transform 0.15s;
        }
        .debug-panel[open] > summary::before { transform: rotate(90deg); }

        .json-tree {
            padding: 10px 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.7;
            color: #d1d5db;
            overflow-x: auto;
        }

        .jt-node > summary {
            cursor: pointer;
            list-style: none;
            user-select: none;
            padding: 1px 2px;
            border-radius: 3px;
            display: flex;
            align-items: baseline;
            gap: 0;
        }
        .jt-node > summary::-webkit-details-marker { display: none; }
        .jt-node > summary:hover { background: #1e293b; }
        .jt-node > summary::before {
            content: '▶';
            font-size: 9px;
            color: #4b5563;
            transition: transform 0.1s;
            display: inline-block;
            width: 14px;
            flex-shrink: 0;
        }
        .jt-node[open] > summary::before { transform: rotate(90deg); }

        .jt-children {
            padding-left: 14px;
            border-left: 1px solid #2d3748;
            margin-left: 6px;
        }

        .jt-row {
            padding: 1px 2px;
            display: flex;
            align-items: baseline;
            gap: 0;
        }
        .jt-row::before {
            content: '';
            width: 14px;
            flex-shrink: 0;
        }

        .j-str   { color: #34d399; }
        .j-num   { color: #60a5fa; }
        .j-bool  { color: #f59e0b; }
        .j-null  { color: #6b7280; font-style: italic; }
        .j-key   { color: #c084fc; }
        .jt-bracket { color: #9ca3af; }
        .jt-count   { color: #4b5563; font-size: 11px; margin: 0 4px; }
        .jt-punct   { color: #6b7280; white-space: pre; }

        /* Leaflet dark overrides */
        .leaflet-container { background: #1e293b; }
        .leaflet-control-attribution { background: rgba(17,24,39,0.8) !important; color: #ccc !important; }
        .leaflet-control-attribution a { color: #cecece !important; }
        .leaflet-control-zoom a {
            background: #111827 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
        }
        .leaflet-control-zoom a:hover { background: #1f2937 !important; color: #00a651 !important; }
    </style>
</head>
<body>

<header>
    <div class="header-brand">
        <img src="https://kygislicserv.ky.gov/mini-apps/oblique-service/images/logo-small.svg" alt="KY DGI" style="height:40px;width:auto;display:block;">
        <div class="brand-text">
            <span class="brand-title">Catalog Explorer</span>
            <span class="brand-subtitle">Kentucky Division of Geographic Information</span>
        </div>
    </div>
    <div class="header-controls">
        <!-- <div class="coord-group">
            <label for="latitude">Lat</label>
            <input type="text" id="latitude" name="latitude" value="38.0">
        </div>
        <span class="separator">/</span>
        <div class="coord-group">
            <label for="longitude">Lon</label>
            <input type="text" id="longitude" name="longitude" value="-84.5">
        </div> -->
        <div class="coord-group">   
            <label for="latlon">Lat, Lon or X, Y (EPSG: 3089)</label>
                <input type="text" id="latlon" name="latlon" placeholder="lat, lon or x, y">
        </div>
        <button id="submit-btn">Search</button>
        <button id="clear-history-btn" style="display:none">Clear History</button>
        <button id="download-geojson-btn" style="display:none">&#8595; GeoJSON</button>
    </div>
</header>

<div id="map">
    <!-- <div class="map-hint">Click the map to search a location</div> -->
</div>
<div id="map-resize-handle"></div>

<div id="status-bar">Ready — click the map or enter coordinates and press Search.</div>

<main id="output"></main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js"></script>
<script>
    // ── Map setup ──────────────────────────────────────────────────────────────
    const KY_BOUNDS = [[36.497, -89.572], [39.147, -81.965]];
    const map = L.map('map', { zoomControl: true, maxZoom: 23 }).fitBounds(KY_BOUNDS, { animate: false });

    const BASEMAP_URL = (
  "https://kygisserver.ky.gov/arcgis/rest/services/WGS84WM_Services/Ky_TCM_Base_WGS84WM/MapServer"
);

const baseMap = L.esri.tiledMapLayer({
  url: BASEMAP_URL,
  attribution: "Ky Division of Geographic Information",
  opacity: 0.9,
  maxNativeZoom: 20, 
  maxZoom: 23 
}).addTo(map);


    const markerIcon = L.divIcon({
        className: '',
        html: `<div style="
            width:14px;height:14px;
            background:#00a651;
            border:2px solid #fff;
            border-radius:50%;
            box-shadow:0 0 0 3px rgba(0,166,81,0.4);
        "></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
    });

    let marker = null;
    // History layer sits below the active bbox layer
    const historyLayer = L.layerGroup().addTo(map);
    // Layer group for current search bbox polygons
    const bboxLayer = L.layerGroup().addTo(map);

    function placeMarker(lat, lng) {
        if (marker) {
            marker.setLatLng([lat, lng]);
        } else {
            marker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
        }
    }

    function drawBboxes(features) {
        bboxLayer.clearLayers();
        features.forEach(f => {
            if (!f.bbox) return;
            const [minX, minY, maxX, maxY] = f.bbox;
            L.rectangle([[minY, minX], [maxY, maxX]], {
                color: '#00a651',
                weight: 1.5,
                opacity: 0.8,
                fillColor: '#00a651',
                fillOpacity: 0.08
            })
            .addTo(bboxLayer);
        });
    }

    // ── Map resize handle ──────────────────────────────────────────────────────
    const mapEl = document.getElementById('map');
    const handle = document.getElementById('map-resize-handle');
    const MIN_H = 80, MAX_H = window.innerHeight * 0.85;

    handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const startY = e.clientY;
        const startH = mapEl.offsetHeight;
        handle.classList.add('dragging');

        function onMove(e) {
            const h = Math.min(MAX_H, Math.max(MIN_H, startH + e.clientY - startY));
            mapEl.style.height = h + 'px';
            map.invalidateSize();
        }

        function onUp() {
            handle.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });

    map.on('click', (e) => {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);
        latlonInput.value = `${lat}, ${lng}`;
        placeMarker(lat, lng);
        const cached = findCachedEntry(parseFloat(lat), parseFloat(lng));
        if (cached) {
            restoreEntry(cached);
        } else {
            runSearch(parseFloat(lat), parseFloat(lng));
        }
    });

    // ── Helpers ────────────────────────────────────────────────────────────────

    // take a string input and return a valid lat or lon number, or null if invalid
    // also, take either xy, yx, lat/lon or lon/lat order and return in lat, lon order
    function checkCoords (s) {
        console.log('Checking coords:', s);
        if (typeof s === 'string') {
            const parts = s.replace(/°/g, '').split(',').map(p => p.trim());
            console.log('Parsed parts:', parts);
            if (parts.length === 2) {
                const nums = parts.map(Number);
                console.log('Parsed numbers:', nums);
                if (nums.every(n => !isNaN(n))) {
                    // Heuristic: if the first number is between 36 and 40, treat as lat,lon in kentucky; otherwise assume lon,lat order
                    if (nums[0] >= 36 && nums[0] <= 40 && nums[1] >= -90 && nums[1] <= -81) {
                        return [nums[0],nums[1]];
                    } else if (nums[1] >= 36 && nums[1] <= 40 && nums[0] >= -90 && nums[0] <= -81) {
                        return [nums[1], nums[0]];
                    } else if (nums[0] > 1000000 && nums[1] > 1000000) {
                        // If both numbers are large, assume they're in EPSG:3089 (US survey feet) and convert to lat/lon
                        return project3089To4326(nums[0], nums[1]); // note the reversed order for x,y
                    } else {
                        return null;
                    }
                }
            }
        }
        return null;
    }

    function project3089To4326(x, y) {
        const [a, b] = proj4('EPSG:3089', 'EPSG:4326', [x, y]); // project to WGS84 first
        console.log('Projected to WGS84:', b, a);
        return [b, a]; // proj4('EPSG:3089', 'EPSG:4326', [x, y]); // Note: proj4 uses [lon, lat] order for coordinates
    }

    const services = {
        "laz-phase1": "Ky_DSM_First_Return_5FT_Phase1",
        "laz-phase2": "Ky_DSM_First_Return_2FT_Phase2",
        "laz-phase3": "Ky_DSM_First_Return_2FT_Phase2",
        "dem-phase1": "Ky_DEM_KYAPED_5FT",
        "dem-phase2": "Ky_DEM_KYAPED_2FT_Phase2",
        "dem-phase3": "Ky_DEM_KYAPED_2FT_Phase3"
    };

    const collectionLabels = {
        "laz-phase1": "Phase 1 Lidar",
        "laz-phase2": "Phase 2 Lidar",
        "laz-phase3": "Phase 3 Lidar",
        "dem-phase1": "Phase 1 DEM",
        "dem-phase2": "Phase 2 DEM",
        "dem-phase3": "Phase 3 DEM",
        "ortho-phase1": "Phase 1 Ortho",
        "ortho-phase2": "Phase 2 Ortho",
        "ortho-phase3": "Phase 3 Ortho",
        "orthos-phase1": "Phase 1 Ortho",
        "orthos-phase2": "Phase 2 Ortho",
        "orthos-phase3": "Phase 3 Ortho"
    };

    // Native source pixel size in US survey feet (EPSG:3089 horizontal unit)
    const nativeResolutionFt = {
        "dem-phase1": 5,
        "dem-phase2": 2,
        "dem-phase3": 0.25   // 3 inches
    };

    function buildHillshadeUrl(bbox, service) {
        const base = `https://kyraster.ky.gov/arcgis/rest/services/ElevationServices/${service}/ImageServer/exportImage`;
        const params = new URLSearchParams({
            bbox: bbox.join(','),
            bboxSR: '4326',
            size: '200,200',
            imageSR: '3089',
            time: '',
            format: 'jpgpng',
            pixelType: 'UNKNOWN',
            interpolation: '+RSP_BilinearInterpolation',
            renderingRule: JSON.stringify({
                rasterFunction: 'Hillshade',
                rasterFunctionArguments: { HillshadeType: 1, ZFactor: 1.0 },
                variableName: 'DEM'
            }),
            f: 'image'
        });
        return `${base}?${params}`;
    }

    function formatDate(str) {
        if (!str) return '—';
        const d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function featureDate(feature) {
        const p = feature.properties || {};
        return new Date(p.datetime || p.start_datetime || 0);
    }

    function collectionTag(collection) {
        if (!collection) return '';
        const cls = collection.startsWith('dem') ? 'tag-dem' : 'tag-laz';
        return `<span class="card-collection ${cls}">${collection}</span>`;
    }

    function primaryFilename(assets) {
        if (!assets) return '';
        const keys = ['data', 'image', 'visual', 'thumbnail'];
        for (const k of keys) {
            if (assets[k]?.href) return assets[k].href.split('?')[0].split('/').pop();
        }
        const first = Object.values(assets).find(a => a?.href);
        return first ? first.href.split('?')[0].split('/').pop() : '';
    }

    function attrRow(label, value) {
        if (value == null || value === '') return '';
        return `<div class="attr-row">
            <span class="attr-label">${label}</span>
            <span class="attr-value">${value}</span>
        </div>`;
    }

    const DOWNLOAD_ASSET_TYPES = new Set([
        'application/vnd.laszip',
        'application/octet-stream',
        'image/tiff',
        'image/geotiff',
        'application/geo+json',
    ]);
    const SKIP_ASSET_KEYS = new Set(['thumbnail', 'overview']);

    function assetFormatLabel(key, asset) {
        const type = (asset.type || '').toLowerCase();
        const href = (asset.href || '');
        const ext  = href.split('?')[0].split('.').pop().toLowerCase();
        const isCog = /s3\.|amazonaws|cloudfront/.test(href);

        const isCopc = type.includes('copc') || key.toLowerCase().includes('copc') || href.toLowerCase().includes('copc');
        if (type === 'application/vnd.laszip' || ext === 'laz') return isCopc ? 'COPC LAZ' : 'LAZ';
        if (ext === 'las') return isCopc ? 'COPC LAS' : 'LAS';
        if (type.includes('tiff') || type.includes('tif') || ext === 'tif' || ext === 'tiff')
            return isCog ? 'COG TIFF' : 'GeoTIFF';
        if (type === 'application/geo+json' || ext === 'geojson') return 'GeoJSON';
        if (ext === 'jpg' || ext === 'jpeg') return 'JPEG';
        // fallback: strip MIME prefix cruft and use key
        return key.toUpperCase();
    }

    function downloadLinks(assets) {
        let entries = Object.entries(assets || {})
            .filter(([key, asset]) =>
                !SKIP_ASSET_KEYS.has(key) &&
                (DOWNLOAD_ASSET_TYPES.has(asset.type) || key === 'data' || key === 'laz' || key === 'tif' || key === 'geotiff')
            );

        if (!entries.length) {
            entries = Object.entries(assets || {})
                .filter(([key, asset]) => {
                    if (SKIP_ASSET_KEYS.has(key) || key === 'thumbnail') return false;
                    const ext = (asset.href || '').split('?')[0].split('.').pop().toLowerCase();
                    return ext !== 'png';
                });
        }

        if (!entries.length) return '';

        const links = entries.map(([key, asset]) => {
            if (key !== 'metadata') return `<a class="dl-link" href="${asset.href}" target="_blank" rel="noopener">&#8595; ${assetFormatLabel(key, asset)}</a>`
        }).join('');

        const tfwEntry = Object.values(assets).find(a => a?.href && a.href.split('?')[0].toLowerCase().endsWith('.tfw'));
        const tfwLink = tfwEntry
            ? `<a class="dl-link" href="${tfwEntry.href}" target="_blank" rel="noopener">&#8595; TFW</a>`
            : '';

        return `<div class="card-downloads">${links}${tfwLink}</div>`;
    }

    function stacCard(feature) {
        const p = feature.properties || {};
        const date = formatDate(p.datetime || p.start_datetime);
        const hasThumbnail = feature.assets?.thumbnail && !feature.collection.includes('dem');
        const thumbSrc = hasThumbnail
            ? feature.assets.thumbnail.href
            : (services[feature.collection] ? buildHillshadeUrl(feature.bbox, services[feature.collection]) : null);

        const thumb = thumbSrc
            ? `<img class="card-thumb" src="${thumbSrc}" alt="${feature.id}" loading="lazy">`
            : `<div class="card-thumb-placeholder">&#9974;</div>`;

        return `<div class="card">
            ${thumb}
            <div class="card-body">
                <div class="card-title">${collectionLabels[feature.collection] || feature.collection}</div>
                <div class="card-subtitle">${feature.id}</div>
                <div class="card-attrs">
                    ${attrRow('Date', date)}
                    ${attrRow('GSD', p.gsd ? p.gsd + ' m' : null)}
                    ${attrRow('Platform', p.platform)}
                    ${attrRow('Instrument', p.instruments?.join(', '))}
                    ${attrRow('EPSG', p['proj:epsg'] ?? 3089)}
                    ${attrRow('Cloud %', p['eo:cloud_cover'] != null ? p['eo:cloud_cover'] + '%' : null)}
                </div>
                ${downloadLinks(feature.assets)}
            </div>
        </div>`;
    }

    // Each oblique item has North/South/East/West sub-objects with the actual shot data
    const OBLIQUE_DIRS = ['North', 'South', 'East', 'West'];

    function imgError(el) {
        el.outerHTML = '<div class="card-thumb-placeholder">&#128247;</div>';
    }

    function obliqueCard(data, dirLabel) {
        if (!data) return '';

        const thumbUrl = data.S3URL
            ? `https://6hp4guqpwe.execute-api.us-west-2.amazonaws.com/cog/preview/200x200.jpg?url=${encodeURIComponent(data.S3URL)}&max_size=100`
            : null;

        const thumb = thumbUrl
            ? `<img class="card-thumb" src="${thumbUrl}" alt="${data.ShotID || dirLabel}" loading="lazy" onerror="imgError(this)">`
            : `<div class="card-thumb-placeholder">&#128247;</div>`;

        const dlLink = data.S3URL
            ? `<div class="card-downloads"><a class="dl-link" href="${data.S3URL}" target="_blank" rel="noopener">&#8595; TIFF</a></div>`
            : '';

        const label = dirLabel || data.Direction || 'oblique';
        const obliqueFilename = data.S3URL ? data.S3URL.split('/').pop() : (data.ShotID || '');

        return `<div class="card">
            ${thumb}
            <div class="card-body">
                <div class="card-title">${label}</div>
                <div class="card-subtitle">${obliqueFilename}</div>
                <div class="card-attrs">
                    ${attrRow('Date', formatDate(data.FlightDate))}
                    ${attrRow('Flight Line', data.FlightLine)}
                    ${attrRow('Camera', data.Camera)}
                    ${attrRow('Altitude', data.Altitude ? data.Altitude + ' ft' : null)}
                    ${attrRow('GSD', data.GSD ? data.GSD + ' in' : null)}
                </div>
                ${dlLink}
            </div>
        </div>`;
    }

    function obliqueDirectionCards(item) {
        // Try direction sub-objects first (North/South/East/West)
        const dirCards = OBLIQUE_DIRS.map(dir => obliqueCard(item[dir], dir)).join('');
        // Fall back to rendering the item itself if no direction sub-objects found
        return dirCards.trim() ? dirCards : obliqueCard(item, item.Direction);
    }

    // ── JSON / debug ───────────────────────────────────────────────────────────
    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function renderJsonTree(data, key = null, depth = 0) {
        const keyHtml = key !== null
            ? `<span class="j-key">${escHtml(JSON.stringify(key))}</span><span class="jt-punct">: </span>`
            : '';

        if (data === null)             return `<div class="jt-row">${keyHtml}<span class="j-null">null</span></div>`;
        if (typeof data === 'boolean') return `<div class="jt-row">${keyHtml}<span class="j-bool">${data}</span></div>`;
        if (typeof data === 'number')  return `<div class="jt-row">${keyHtml}<span class="j-num">${data}</span></div>`;
        if (typeof data === 'string')  return `<div class="jt-row">${keyHtml}<span class="j-str">${escHtml(JSON.stringify(data))}</span></div>`;

        const isArr = Array.isArray(data);
        const entries = isArr ? data.map((v, i) => [i, v]) : Object.entries(data);
        const [open, close] = isArr ? ['[', ']'] : ['{', '}'];

        if (entries.length === 0) {
            return `<div class="jt-row">${keyHtml}<span class="jt-bracket">${open}${close}</span></div>`;
        }

        const summary = `${keyHtml}<span class="jt-bracket">${open}</span><span class="jt-count">${entries.length} ${isArr ? 'items' : 'keys'}</span><span class="jt-bracket">${close}</span>`;
        const children = entries.map(([k, v]) => renderJsonTree(v, k, depth + 1)).join('');
        const openAttr = depth === 0 ? ' open' : '';

        return `<details class="jt-node"${openAttr}>
            <summary>${summary}</summary>
            <div class="jt-children">${children}</div>
        </details>`;
    }

    function debugPanel(title, data) {
        return `<details class="debug-panel" open>
            <summary>${escHtml(title)}</summary>
            <div class="json-tree">${renderJsonTree(data)}</div>
        </details>`;
    }

    function setStatus(msg, loading = false) {
        const bar = document.getElementById('status-bar');
        bar.innerHTML = loading ? `<span class="spinner"></span> ${msg}` : msg;
    }

    // ── Query history (localStorage) ───────────────────────────────────────────
    const HISTORY_KEY = 'kydgi-catalog-history';

    function loadHistory() {
        try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
        catch { return []; }
    }

    function saveToHistory(lat, lon, stacData, obliqueData) {
        const history = loadHistory();
        history.push({ id: Date.now(), lat, lon, stacData, obliqueData });
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        refreshClearBtn();
    }

    function clearHistory() {
        localStorage.removeItem(HISTORY_KEY);
        historyLayer.clearLayers();
        refreshClearBtn();
    }

    function refreshClearBtn() {
        const hasHistory = loadHistory().length > 0;
        clearHistoryBtn.style.display = hasHistory ? '' : 'none';
        downloadGeoJsonBtn.style.display = hasHistory ? '' : 'none';
    }

    // Returns the first saved entry whose STAC bboxes contain [lon, lat], or null.
    function findCachedEntry(lat, lon) {
        for (const entry of loadHistory()) {
            for (const f of (entry.stacData?.features || [])) {
                if (!f.bbox) continue;
                const [minX, minY, maxX, maxY] = f.bbox;
                if (lon >= minX && lon <= maxX && lat >= minY && lat <= maxY) {
                    return entry;
                }
            }
        }
        return null;
    }

    function drawHistoryBboxes() {
        historyLayer.clearLayers();
        loadHistory().forEach(entry => {
            (entry.stacData?.features || []).forEach(f => {
                if (!f.bbox) return;
                const [minX, minY, maxX, maxY] = f.bbox;
                L.rectangle([[minY, minX], [maxY, maxX]], {
                    color: '#00a651',
                    weight: 1,
                    opacity: 0.35,
                    fillColor: '#00a651',
                    fillOpacity: 0.04,
                    dashArray: '5 5'
                })
                .on('click', () => restoreEntry(entry))
                .addTo(historyLayer);
            });
        });
    }

    function restoreEntry(entry) {
        placeMarker(entry.lat, entry.lon);
        map.panTo([entry.lat, entry.lon], { animate: false });
        latlonInput.value = `${entry.lat}, ${entry.lon}`;
        history.replaceState(null, '', `?lat=${entry.lat}&lon=${entry.lon}`);
        renderResults(entry.stacData, entry.obliqueData);
        drawBboxes(entry.stacData?.features || []);
        setStatus(`Restored query from ${new Date(entry.id).toLocaleString()}.`);
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderResults(stacData, obliqueData) {
        const stacFeatures = (stacData.features || [])
            .slice()
            .sort((a, b) => featureDate(a) - featureDate(b));

        const obliqueValue = obliqueData.results?.[0]?.value || {};
        const obliqueDirCount = OBLIQUE_DIRS.filter(d => obliqueValue[d]).length;

        outputDiv.innerHTML = `
        <section>
            <div class="section-header">
                <span class="section-title">Elevation &amp; Lidar Items</span>
                <span class="count-badge">${stacFeatures.length}</span>
            </div>
            <div class="card-grid">
                ${stacFeatures.map(stacCard).join('') || '<p class="empty-state">No items found.</p>'}
            </div>
        </section>
        <section>
            <div class="section-header">
                <span class="section-title">Closest Oblique Imagery</span>
                <span class="count-badge">${obliqueDirCount} shots</span>
            </div>
            <div class="card-grid">
                ${OBLIQUE_DIRS.map(dir => obliqueCard(obliqueValue[dir], dir)).join('') || '<p class="empty-state">No oblique imagery found.</p>'}
            </div>
        </section>
        <section class="debug-section">
            <div class="section-header">
                <span class="section-title">Debug</span>
                <span class="count-badge">raw API responses</span>
            </div>
            ${debugPanel('STAC response', stacData)}
            ${debugPanel('Oblique response', obliqueData)}
        </section>`;

        return { stacFeatures, obliqueDirCount };
    }

    // ── Search ─────────────────────────────────────────────────────────────────
    const submitBtn = document.getElementById('submit-btn');
    const clearHistoryBtn = document.getElementById('clear-history-btn');
    const downloadGeoJsonBtn = document.getElementById('download-geojson-btn');
    const outputDiv = document.getElementById('output');
    const latlonInput = document.getElementById('latlon');
    const stacApi    = 'https://spved5ihrl.execute-api.us-west-2.amazonaws.com';
    const obliqueApi = 'https://kygisserver.ky.gov/arcgis/rest/services/Temp_Services/GetObliqueCentroids/GPServer/GetObliqueCentroids';

    let searching = false;
    let pendingSearch = null;

    async function runSearch(lat, lon) {
        lat = parseFloat(lat).toFixed(6);
        lon = parseFloat(lon).toFixed(6);

        // If a request is already in-flight, queue this one (last-write-wins) and bail.
        if (searching) {
            pendingSearch = { lat, lon };
            return;
        }

        searching = true;
        submitBtn.disabled = true;
        outputDiv.innerHTML = '';
        setStatus('Searching catalog…', true);
        history.replaceState(null, '', `?lat=${lat}&lon=${lon}`);
        latlonInput.value = `${lat}, ${lon}`;
        try {
            const [stacResponse, obliqueResponse] = await Promise.all([
                fetch(`${stacApi}/search?intersects={"type":"Point","coordinates":[${lon},${lat}]}`),
                fetch(`${obliqueApi}/execute?latitude=${lat}&longitude=${lon}&f=json`)
            ]);

            const [stacData, obliqueData] = await Promise.all([
                stacResponse.json(),
                obliqueResponse.json()
            ]);

            const { stacFeatures, obliqueDirCount } = renderResults(stacData, obliqueData);
            drawBboxes(stacFeatures);
            saveToHistory(lat, lon, stacData, obliqueData);
            drawHistoryBboxes();

            setStatus(`Found ${stacFeatures.length} catalog item(s) and ${obliqueDirCount} oblique shot(s).`);
        } catch (err) {
            console.error(err);
            setStatus(`Error: ${err.message}`);
        } finally {
            searching = false;
            submitBtn.disabled = false;

            // Run the queued search now that we're clear — but check cache first
            // so a double-tap on the same spot doesn't re-query or duplicate storage.
            if (pendingSearch) {
                const { lat: pLat, lon: pLon } = pendingSearch;
                pendingSearch = null;
                const cached = findCachedEntry(parseFloat(pLat), parseFloat(pLon));
                if (cached) {
                    restoreEntry(cached);
                } else {
                    runSearch(pLat, pLon);
                }
            }
        }
    }

    clearHistoryBtn.addEventListener('click', () => {
        clearHistory();
        setStatus('Query history cleared.');
    });

    downloadGeoJsonBtn.addEventListener('click', () => {
        const features = loadHistory().flatMap(e => (e.stacData?.features || []).map(f => {
            const assetLinks = {};
            for (const [key, asset] of Object.entries(f.assets || {})) {
                if (asset?.href) assetLinks[`asset_${key}`] = asset.href;
            }
            return {
                type: 'Feature',
                id: f.id,
                geometry: f.geometry,
                bbox: f.bbox,
                properties: {
                    ...f.properties,
                    collection: f.collection,
                    collection_label: collectionLabels[f.collection] || f.collection,
                    stac_id: f.id,
                    ...assetLinks
                }
            };
        }));
        const geojson = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/geo+json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'kydgi-queries.geojson';
        a.click();
        URL.revokeObjectURL(a.href);
    });

    submitBtn.addEventListener('click', () => {
        // const lat = parseFloat(latInput.value);
        // const lon = parseFloat(lonInput.value);
        const [lat, lon] = checkCoords(latlonInput.value);
        console.log('Checked coords:', lat, lon);
        if (isNaN(lat) || isNaN(lon)) { setStatus('Invalid coordinates.'); return; }
        placeMarker(lat, lon);
        map.panTo([lat, lon]);
        runSearch(lat, lon);
    });

    // ── Init history ───────────────────────────────────────────────────────────
    drawHistoryBboxes();
    refreshClearBtn();

    // Zoom to extent of all previously queried areas on load
    const allBboxes = loadHistory().flatMap(e => (e.stacData?.features || []).map(f => f.bbox).filter(Boolean));
    if (allBboxes.length) {
        const bounds = L.latLngBounds(allBboxes.map(([minX, minY, maxX, maxY]) => [[minY, minX], [maxY, maxX]]));
        map.fitBounds(bounds, { padding: [20, 20], animate:false });
    }

    // ── Init from URL params ───────────────────────────────────────────────────
    const sp = new URLSearchParams(location.search);
    const initLat = parseFloat(sp.get('lat'));
    const initLon = parseFloat(sp.get('lon'));
    if (!isNaN(initLat) && !isNaN(initLon)) {
        latlonInput.value = `${initLat}, ${initLon}`;
        placeMarker(initLat, initLon);
        map.setView([initLat, initLon], 12, { animate: false });
        const cached = findCachedEntry(initLat, initLon);
        if (cached) {
            restoreEntry(cached);
        } else {
            runSearch(initLat, initLon);
        }
    }


// Working on on-the-fly image exports with world files (.tfw) for georeferencing 

    // EPSG:3089 — NAD83 / Kentucky Single Zone (US survey feet)
    proj4.defs('EPSG:3089',
        '+proj=lcc +lat_0=36.3333333333333 +lon_0=-85.75 ' +
        '+lat_1=37.0833333333333 +lat_2=38.6666666666667 ' +
        '+x_0=1500000 +y_0=1000000 +ellps=GRS80 ' +
        '+towgs84=0,0,0,0,0,0,0 +units=us-ft +no_defs'
    );

    // Build a TIFF world file (.tfw) string for a bbox in EPSG:4326
    // projected to EPSG:3089 at the given pixel dimensions.
    // TFW line order: pixelWidth, rowRotation, colRotation, pixelHeight (neg), centerULX, centerULY
    function buildWorldFile(bbox, width, height) {
        const [minLon, minLat, maxLon, maxLat] = bbox;
        const [minX, minY] = proj4('EPSG:4326', 'EPSG:3089', [minLon, minLat]);
        const [maxX, maxY] = proj4('EPSG:4326', 'EPSG:3089', [maxLon, maxLat]);

        const pixelWidth  =  (maxX - minX) / width;
        const pixelHeight = -(maxY - minY) / height; // negative — Y decreases down the image
        const centerULX   = minX + pixelWidth  / 2;
        const centerULY   = maxY + pixelHeight / 2;  // maxY minus half-pixel

        return [pixelWidth, 0.0, 0.0, pixelHeight, centerULX, centerULY]
            .map(n => n.toFixed(10))
            .join('\n');
    }

    function downloadFile(content, filename) {
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(new Blob([content], { type: 'text/plain' })),
            download: filename
        });
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // Returns { url, tfw, width, height }
    // Computes output dimensions at native resolution (pixelSizeFt), capped at MAX_DIM.
    // World file is derived from the same projected coords so it matches exactly.
    const MAX_EXPORT_DIM = 4096;

    function exportImageService(bbox, image, service, pixelSizeFt = 2) {
        // Project bbox corners from WGS84 → EPSG:3089 (US survey feet)
        const [minLon, minLat, maxLon, maxLat] = bbox;
        const [minX, minY] = proj4('EPSG:4326', 'EPSG:3089', [minLon, minLat]);
        const [maxX, maxY] = proj4('EPSG:4326', 'EPSG:3089', [maxLon, maxLat]);

        // Pixel dimensions at native resolution, scaled down if they exceed the cap
        const rawW = Math.round((maxX - minX) / pixelSizeFt);
        const rawH = Math.round((maxY - minY) / pixelSizeFt);
        const scale  = Math.min(1, MAX_EXPORT_DIM / Math.max(rawW, rawH, 1));
        const width  = Math.max(1, Math.round(rawW * scale));
        const height = Math.max(1, Math.round(rawH * scale));

        const base = `https://kyraster.ky.gov/arcgis/rest/services/${image}/${service}/ImageServer/exportImage`;
        const params = new URLSearchParams({
            bbox: bbox.join(','),
            bboxSR: '4326',
            size: `${width},${height}`,
            imageSR: '3089',
            time: '',
            format: 'tiff',
            pixelType: 'UNKNOWN',
            interpolation: '+RSP_BilinearInterpolation',
            renderingRule: JSON.stringify({
                rasterFunction: 'Hillshade',
                rasterFunctionArguments: { HillshadeType: 1, ZFactor: 1.0 },
                variableName: 'DEM'
            }),
            f: 'image'
        });

        // Build TFW from the actual output pixel size (accounts for any capping)
        const pixelWidth  =  (maxX - minX) / width;
        const pixelHeight = -(maxY - minY) / height;
        const centerULX   = minX + pixelWidth  / 2;
        const centerULY   = maxY + pixelHeight / 2;
        const tfw = [pixelWidth, 0.0, 0.0, pixelHeight, centerULX, centerULY]
            .map(n => n.toFixed(10))
            .join('\n');

        return { url: `${base}?${params}`, tfw, width, height };
    }
