<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyFromAbove Catalog Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        /* ── Custom fonts ── */
        @font-face {
            font-family: 'BellTopo Sans';
            src: url('BellTopoSans/BellTopoSansRegular.woff') format('woff');
            src: url('BellTopoSans/BellTopoSansRegular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'BellTopo Sans';
            src: url('BellTopoSans/BellTopoSansBold.woff') format('woff');
            src: url('BellTopoSans/BellTopoSansBold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'BellTopo Sans';
            src: url('BellTopoSans/BellTopoSansItalic.woff') format('woff');
            src: url('BellTopoSans/BellTopoSansItalic.woff2') format('woff2');
            font-weight: 400;
            font-style: italic;
        }
        @font-face {
            font-family: 'BellTopo Sans';
            src: url('BellTopoSans/BellTopoSansBoldItalic.woff') format('woff');
            src: url('BellTopoSans/BellTopoSansBoldItalic.woff2') format('woff2');
            font-weight: 700;
            font-style: italic;
        }

        /* ── Design constants ────────────────────────────────────────────────────────
           All brand colors, typography, and spacing live here. Update this block
           when making visual changes rather than hunting through the stylesheet.
        ── */
        :root {
            /* KyFromAbove brand green scale */
            --green:          #00a651;
            --green-dark:     #047857;
            --green-darker:   #064e3b;
            --green-muted:    #9dba9d;
            --green-light:    #d8e8d8;
            --green-bg:       #e2ece2;
            --green-bg-mid:   #d1ddd1;
            --green-bg-pale:  #f0f5f0;
            --green-status:   #cce0cc;

            /* Text hierarchy */
            --text:           #0f1a0f;
            --text-mid:       #3d5c3d;
            --text-light:     #4e6e4e;
            --text-muted:     #5a7a5a;

            /* Link / action accent */
            --blue:           #1a6fa8;

            /* Typography */
            --font-ui:        'Dosis', sans-serif;
            --font-body:      'BellTopo Sans', sans-serif;

            /* Spacing scale  */
            --space-xs:  4px;
            --space-sm:  8px;
            --space-md:  12px;
            --space-lg:  16px;
            --space-xl:  24px;
            --space-2xl: 36px;

            /* Font-size scale */
            --font-size-xs:   11px;  /* badges, small action labels */
            --font-size-sm:   12px;  /* tags, secondary code text */
            --font-size-md:   13px;  /* form labels, metadata */
            --font-size-base: 14px;  /* primary UI text, buttons */
            --font-size-lg:   17px;  /* card/panel headings */
            --font-size-xl:   18px;  /* header accents, separators */
            --font-size-2xl:  20px;  /* section titles */
            --font-size-3xl:  24px;  /* large icon placeholders */
        }

        /* ── Reset & base ── */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: var(--font-body);
            background: var(--green-bg-pale);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 100%;
        }

        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Header ── */
        header {
            background: var(--green-bg);
            border-bottom: 2px solid var(--green);
            padding: 0 var(--space-xl);
            z-index: 1000;
            position: relative;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0 10px;
            border-bottom: 1px solid var(--green-muted);
        }

        .brand-badge {
            background: var(--green);
            color: #fff;
            font-size: var(--font-size-xl);
            font-weight: 700;
            padding: var(--space-xs) 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .brand-text { 
            display: flex; 
            flex-direction: column; 
            line-height: 1.2; 
        }
        .brand-title { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: var(--text); 
        }
        .brand-subtitle { 
            font-size: var(--font-size-md); 
            font-weight: 400; 
            color: var(--text-mid); 
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: var(--space-md) 0;
            flex-wrap: wrap;
        }

        .coord-group { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }

        .coord-group label {
            font-size: var(--font-size-md);
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .coord-group input {
            background: var(--green-bg-pale);
            border: 1px solid var(--green-muted);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: var(--font-size-base);
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 4px;
            width: 180px;
            outline: none;
            transition: border-color 0.2s;
        }

        .coord-group input:focus { 
            border-color: var(--green); 
        }
        .separator { 
            color: var(--text-muted); 
            font-size: var(--font-size-xl); 
        }

        /* ── Toolbar buttons ──────────────────────────────────────────────────────
           Shared base styles. Specific overrides below by ID.
           Primary (submit): solid green fill. Secondary (others): ghost/outline.
        ── */

        /* Shared base: font, size, shape */
        #submit-btn,
        #clear-history-btn,
        #download-geojson-btn,
        #info-btn {
            font-family: var(--font-ui);
            font-size: var(--font-size-base);
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        /* Primary action — solid green fill */
        #submit-btn {
            background: var(--green);
            color: #fff;
            border: none;
            padding: 7px 20px;
            transition: background 0.2s;
        }
        #submit-btn:hover    { 
            background: var(--green-dark); 
        }
        #submit-btn:active   { 
            background: var(--green-darker); 
        }
        #submit-btn:disabled { 
            background: var(--green-muted); 
            color: var(--text-light); 
            cursor: not-allowed; 
        }

        /* Secondary actions — ghost buttons with muted border */
        #clear-history-btn,
        #download-geojson-btn,
        #info-btn {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--green-muted);
            padding: 6px 14px;
            transition: color 0.2s, border-color 0.2s;
        }

        /* Destructive action turns red on hover */
        #clear-history-btn:hover { 
            color: #a50000; 
            border-color: #a50000; 
            background-color: #a5000015; 
        }

        /* Neutral actions turn blue on hover */
        #download-geojson-btn:hover,
        #info-btn:hover { 
            color: var(--blue); 
            border-color: var(--blue); 
            background-color: #1a6fa815; 
        }

        /* ── Output ── */
        #output {
            background-color: var(--green-bg-mid);
        }

        /* ── Map ── */
        #map {
            width: 100%;
            height: 320px;
            cursor: crosshair;
            flex-shrink: 0;
        }

        /* Drag handle between the map and results panel */
        #map-resize-handle {
            width: 100%;
            height: 6px;
            background: var(--green-muted);
            cursor: ns-resize;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        #map-resize-handle:hover,
        #map-resize-handle.dragging { 
            background: var(--green); 
        }

        #map-resize-handle::after {
            content: '';
            width: 32px;
            height: 2px;
            background: currentColor;
            border-radius: 1px;
            opacity: 0.5;
        }

        .map-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(240,245,240,0.92);
            color: #ff009d;
            font-family: var(--font-body);
            font-size: var(--font-size-sm);
            font-weight: 600;
            padding: var(--space-xs) var(--space-md);
            border-radius: 10px;
            pointer-events: none;
            z-index: 500;
            white-space: nowrap;
        }

        /* ── Status bar — shows search progress and result counts ── */
        #status-bar {
            background: var(--green-status);
            border-bottom: 1px solid var(--green-muted);
            padding: var(--space-sm) var(--space-xl);
            padding-top: var(--space-md);
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--text-mid);
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            z-index: 1;
            position: relative;
        }

        /* Inline spinner used in the status bar and card thumbnails */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--green-muted);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Main content ── */
        main { 
            flex: 1; 
            padding: var(--space-xl); 
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: var(--space-lg);
        }

        .section-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--text);
        }

        .count-badge {
            color: var(--text-mid);
            font-size: var(--font-size-base);
            font-weight: 700;
        }

        section + section { 
            margin-top: var(--space-2xl); 
        }

        /* ── Card grid ── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: var(--space-lg);
        }

        /* Each result card: holds thumbnail, metadata, and download links */
        .card {
            background: #e7edf3;
            border: 1px solid var(--green-muted);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s, transform 0.15s;
        }

        .card:hover {
            border-color: var(--green);
            transform: translateY(-2px);
        }

        /* Thumbnail wrapper: positions the loading spinner absolutely over the image */
        .card-thumb-wrap {
            position: relative;
        }
        .card-thumb-spinner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .card-thumb-spinner .spinner {
            width: 28px;
            height: 28px;
            border-width: 3px;
        }

        .card-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--green-light);
            display: block;
        }

        .card-thumb-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: var(--green-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-muted);
            font-size: var(--font-size-base);
            gap: 6px;
        }
        .card-thumb-placeholder .placeholder-icon { 
            font-size: var(--font-size-3xl); 
        }

        .card-body {
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            flex: 1;
        }

        .card-title {
            font-size: var(--font-size-base);
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: var(--font-size-xs);
            color: var(--text);
            word-break: break-all;
            line-height: 1.4;
        }

        /* Collection tag badge (e.g. "dem-phase2", "laz-phase1") */
        .card-collection {
            display: inline-block;
            font-size: var(--font-size-xs);
            font-weight: 700;
            padding: 2px var(--space-sm);
            border-radius: 10px;
            letter-spacing: 0.4px;
            align-self: flex-start;
        }

        .tag-laz { 
            background: #c8e8d4; 
            color: #065f3d; 
        }
        .tag-dem { 
            background: #c0d8ec; 
            color: #1a4a7a; 
        }

        .card-attrs { 
            display: flex; 
            flex-direction: 
            column; gap: 
            var(--space-xs); 
        }

        .attr-row { 
            display: flex; 
            justify-content: space-between; 
            gap: var(--space-sm); 
        }

        .attr-label {
            color: var(--text);
            font-weight: 700;
            text-transform: uppercase;
            font-size: var(--font-size-xs);
            white-space: nowrap;
        }

        .attr-value {
            color: #1a2e1a;
            font-weight: 600;
            font-size: var(--font-size-sm);
            text-align: right;
            word-break: break-all;
        }

        /* ── Download links — appear at the bottom of each card ── */
        .card-downloads {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: var(--space-xs);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--green-muted);
        }

        .dl-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            background: var(--green-bg-pale);
            border: 1px solid var(--green-muted);
            color: var(--blue);
            font-family: var(--font-ui);
            font-size: var(--font-size-xs);
            font-weight: 700;
            padding: 3px var(--space-sm);
            border-radius: 4px;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: background 0.15s, border-color 0.15s;
        }

        .dl-link:hover { 
            background: #c8dce8; 
            border-color: var(--blue); 
        }
        button.dl-link { cursor: pointer; }

        /* ── Info / About panel — static content cards ── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xl);
            margin-bottom: var(--space-2xl);
        }
        @media (max-width: 640px) { 
            .info-grid { 
                grid-template-columns: 1fr; 
            } 
        }

        .info-card {
            background: #f1f7fc;
            border: 1px solid var(--green-muted);
            border-radius: 8px;
            padding: 20px;
        }
        .info-card h3 {
            font-size: var(--font-size-lg);
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid var(--green-muted);
        }
        .info-card p, .info-card li {
            font-size: var(--font-size-base);
            color: #1a2e1a;
            line-height: 1.7;
        }
        .info-card ul {
            padding-left: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }
        .info-card .api-pill {
            display: inline-block;
            font-size: var(--font-size-base);
            font-weight: 700;
        }
        .info-note {
            margin-top: 10px;
            padding: 10px 14px;
            background: var(--green-light);
            border-left: 3px solid var(--green);
            border-radius: 4px;
            font-size: var(--font-size-sm);
            color: #1a2e1a;
            line-height: 1.6;
        }

        /* ── Empty / error state ── */
        .empty-state { 
            color: var(--text-mid); 
            font-size: var(--font-size-lg); 
            padding: 20px 0; 
        }

        /* ── Debug section — collapsible raw API response panels ── */
        .debug-section {
            margin-top: 48px;
            padding-top: var(--space-xl);
            border-top: 2px solid var(--green-muted);
        }

        .debug-section .section-header { 
            margin-bottom: var(--space-md); 
        }

        .debug-panel {
            background: var(--green-status);
            border: 1px solid var(--green-muted);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: var(--space-md);
        }

        .debug-panel > summary {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            color: var(--text-mid);
            background: var(--green-bg);
            border-bottom: 1px solid var(--green-muted);
            list-style: none;
            user-select: none;
        }

        .debug-panel > summary::-webkit-details-marker { display: none; }
        .debug-panel > summary::before {
            content: '▶';
            font-size: 10px;
            color: var(--text);
            transition: transform 0.15s;
        }
        .debug-panel[open] > summary::before { transform: rotate(90deg); }

        /* Interactive JSON tree viewer inside debug panels */
        .json-tree {
            padding: 10px var(--space-lg);
            font-family: 'Courier New', Courier, monospace;
            font-size: var(--font-size-base);
            line-height: 1.7;
            color: var(--text);
            overflow-x: auto;
            background-color: #e7edf3;
        }

        .jt-node > summary {
            cursor: pointer;
            list-style: none;
            user-select: none;
            padding: 1px 2px;
            border-radius: 3px;
            display: flex;
            align-items: baseline;
            gap: 0;
        }
        .jt-node > summary::-webkit-details-marker { 
            display: none; 
        }
        .jt-node > summary:hover { 
            background: var(--green-light); 
        }
        .jt-node > summary::before {
            content: '▶';
            font-size: 9px;
            color: var(--text);
            transition: transform 0.1s;
            display: inline-block;
            width: 14px;
            flex-shrink: 0;
        }
        .jt-node[open] > summary::before { transform: rotate(90deg); }

        .jt-children {
            padding-left: 14px;
            border-left: 1px solid var(--green-muted);
            margin-left: 6px;
        }

        .jt-row {
            padding: 1px 2px;
            display: flex;
            align-items: baseline;
            gap: 0;
        }
        .jt-row::before {
            content: '';
            width: 14px;
            flex-shrink: 0;
        }

        .j-str   { color: var(--text); }
        .j-num   { color: var(--text); }
        .j-bool  { color: var(--text); }
        .j-null  { 
            color: var(--text); 
            font-style: italic; 
        }
        .j-key   { color: var(--text); }
        .jt-bracket { color: var(--text); }
        .jt-count   { 
            color: var(--text); 
            font-size: var(--font-size-md); 
            margin: 0 var(--space-xs); 
        }
        .jt-punct   { 
            color: var(--text); 
            white-space: pre; 
        }

        /* ── Leaflet overrides — keep the map consistent with the app theme ── */
        .leaflet-container { 
            background: #ddeadd; 
            font-family: var(--font-ui) !important;
        }
        .leaflet-control-attribution { 
            background: rgba(240,245,240,0.88) !important; 
            color: var(--text-mid) !important; 
            font-size: var(--font-size-md) !important;
        }
        .leaflet-control-attribution a { 
            color: var(--green-mid) !important; 
        }
        .leaflet-control-zoom a {
            background: var(--green-bg-pale) !important;
            color: var(--text) !important;
            border-color: var(--green-muted) !important;
        }
        .leaflet-control-zoom a:hover { 
            background: var(--green-bg) !important; 
            color: var(--green) !important; 
        }

        /* ── Footer ── */
        footer {
            background: var(--green-bg);
            border-top: 2px solid var(--green);
            padding: 20px var(--space-xl);
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<header>
    <div class="header-brand">
        <img src="https://kygislicserv.ky.gov/mini-apps/oblique-viewer/logo-small.svg" alt="KY DGI" style="height:50px;width:auto;display:block;">
        <div class="brand-text">
            <span class="brand-title">KyFromAbove Catalog Explorer</span>
            <span class="brand-subtitle">Kentucky Division of Geographic Information</span>
        </div>
    </div>
    <div class="header-controls">
        <div class="coord-group">
            <input type="text" id="latlon" name="latlon" placeholder="Lat, Lon or X, Y or TileName">
        </div>
        <button id="submit-btn">Search</button>
        <button id="clear-history-btn" style="display:none">Clear History</button>
        <button id="download-geojson-btn" style="display:none">GeoJSON</button>
        <button id="info-btn" style="display:none">About</button>
    </div>
</header>

<div id="map"></div>
<div id="map-resize-handle"></div>

<div id="status-bar">Ready — click the map or enter coordinates and press Search.</div>

<main id="output"></main>
<footer>
    <a href="https://kygeonet.ky.gov/" target="_blank"><img src="https://kygislicserv.ky.gov/mini-apps/dsm-viewer/logo.svg" alt="KY DGI" style="height:120px;width:auto;display:block;"></a>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js"></script>
<script>
    // ── Projection setup ───────────────────────────────────────────────────────
    // Registered before any coordinate conversion runs. EPSG:3089 is the
    // KY Single Zone projection in US survey feet used throughout the state data.
    proj4.defs('EPSG:3089',
        '+proj=lcc +lat_0=36.3333333333333 +lon_0=-85.75 ' +
        '+lat_1=37.0833333333333 +lat_2=38.6666666666667 ' +
        '+x_0=1500000 +y_0=1000000 +ellps=GRS80 ' +
        '+towgs84=0,0,0,0,0,0,0 +units=us-ft +no_defs'
    );

    // ── Configuration ──────────────────────────────────────────────────────────
    // All external endpoints, geographic constants, UI limits, and storage keys
    // live here. This is the single place to update when services change or
    // the app is deployed to a different environment.
    const CONFIG = {

    /**
     * Converts EPSG:3089 (KY Single Zone, US survey feet) to WGS84 [lat, lon].
     * @param {number} x - Easting in US survey feet
     * @param {number} y - Northing in US survey feet
     * @returns {[number, number]} [lat, lon] in decimal degrees
     */
    function project3089To4326(x, y) {
        const [a, b] = proj4('EPSG:3089', 'EPSG:4326', [x, y]);
        return [b, a]; // proj4 returns [lon, lat]; swap to [lat, lon]
    }

    /**
     * Queries the KY tile grid service for a named tile and returns its centroid for searching by tile name.
     * The centroid is computed as the average of all ring vertices in the tile polygon.
     * @param {string} name - Tile name in NxxxExxx format (e.g. "N081E279")
     * @returns {Promise<{lat: number, lon: number, name: string}|null>} Centroid or null if not found
     */
    async function queryTileByName(name) {
        const params = new URLSearchParams({
            where: `NAME='${name.replace(/'/g, "''")}'`,
            outFields: 'NAME',
            returnGeometry: true,
            outSR: '4326',
            f: 'json'
        });
        const res = await fetch(`${CONFIG.tileService}/query?${params}`);
        const data = await res.json();
        const feature = data.features?.[0];
        if (!feature) return null;

        const rings = feature.geometry?.rings;
        if (!rings?.length) return null;

        let sumLon = 0, sumLat = 0, count = 0;
        for (const ring of rings) {
            for (const [lon, lat] of ring) {
                sumLon += lon; sumLat += lat; count++;
            }
        }
        return count ? { lat: sumLat / count, lon: sumLon / count, name } : null;
    }

    /**
     * Parses a free-text coordinate string and returns a [lat, lon] pair in WGS84.
     * Accepts: "lat, lon" or "lon, lat" (auto-detected by KY range), EPSG:3089 "X, Y"
     * (detected when both values exceed 1,000,000), or a tile name in NxxxExxx format.
     * Returns [null, null] if the input cannot be resolved to a Kentucky location.
     * @param {string} s - Raw input from the search field or a map-click coordinate string
     * @returns {Promise<[number|null, number|null]>} Resolved [lat, lon] or [null, null]
     */
    async function checkCoords(s) {
        if (typeof s === 'string' && !s.includes('E')) {
            const parts = s.replace(/°/g, '').split(',').map(p => p.trim());
            if (parts.length === 2) {
                const nums = parts.map(Number);
                if (nums.every(n => !isNaN(n))) {
                    const [latMin, latMax] = CONFIG.kyLatRange;
                    const [lonMin, lonMax] = CONFIG.kyLonRange;
                    // Heuristic: if the first number is in KY's lat range, treat as lat,lon
                    if (nums[0] >= latMin && nums[0] <= latMax && nums[1] >= lonMin && nums[1] <= lonMax) {
                        return [nums[0], nums[1]];
                    } else if (nums[1] >= latMin && nums[1] <= latMax && nums[0] >= lonMin && nums[0] <= lonMax) {
                        return [nums[1], nums[0]];
                    } else if (nums[0] > 1000000 && nums[1] > 1000000) {
                        // Both values are large — assume EPSG:3089 (KY Single Zone, US survey feet)
                        return project3089To4326(nums[0], nums[1]);
                    } else {
                        return [null, null];
                    }
                }
            }
        } else if (s.includes('N') && s.includes('E')) {
            const tile = await queryTileByName(s);
            if (tile) {
                return [tile.lat, tile.lon];
            } else {
                console.warn('Tile not found:', s);
                return [null, null];
            }
        }
        console.warn('Could not parse coordinates:', s);
        return [null, null];
    }

    /**
     * Checks whether a WGS84 point falls within a Kentucky county polygon by
     * querying the AGOL county FeatureServer with a spatial intersect.
     * Fails open (returns true) if the service is unreachable, so a network
     * error never silently blocks the user from querying.
     * @param {number} lat - Latitude in decimal degrees
     * @param {number} lng - Longitude in decimal degrees
     * @returns {Promise<boolean>} True if the point intersects a Kentucky county polygon
     */
    async function isInKentucky(lat, lng) {
        try {
            const params = new URLSearchParams({
                geometry: JSON.stringify({ x: lng, y: lat, spatialReference: { wkid: 4326 } }),
                geometryType: 'esriGeometryPoint',
                spatialRel: 'esriSpatialRelIntersects',
                returnCountOnly: 'true',
                f: 'json'
            });
            const res = await fetch(`${CONFIG.countyUrl}/query?${params}`);
            const data = await res.json();
            return (data.count ?? 0) > 0;
        } catch {
            return true; // fail open if the service is unreachable
        }
    }

    // ── File & download utilities ──────────────────────────────────────────────

    /**
     * Extracts the filename from a URL, stripping any query string.
     * e.g. "https://example.com/files/data.laz?token=abc" → "data.laz"
     * @param {string} url
     * @returns {string}
     */
    function getFilename(url) {
        return url.split('?')[0].split('/').pop();
    }

    /**
     * Extracts the lowercase file extension from a URL, stripping any query string.
     * e.g. "https://example.com/data.LAZ?token=abc" → "laz"
     * @param {string} url
     * @returns {string}
     */
    function getExtension(url) {
        return url.split('?')[0].split('.').pop().toLowerCase();
    }

    /**
     * Builds a timestamped GeoJSON export filename.
     * Format: kydgi-queries-YYYYMMDDHH-Nitems.geojson
     * @param {number} count - Number of features being exported
     * @returns {string}
     */
    function buildGeoJsonFilename(count) {
        const d = new Date();
        const pad = n => String(n).padStart(2, '0');
        const stamp = `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}${pad(d.getHours())}`;
        return `KyFromAbove-Catalog-Explorer-${stamp}-${count}tiles.geojson`;
    }

    /**
     * Triggers a browser download of a plain-text string as a named file.
     * @param {string} content  - File contents
     * @param {string} filename - Suggested download filename
     */
    function downloadFile(content, filename) {
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(new Blob([content], { type: 'text/plain' })),
            download: filename
        });
        a.click();
        URL.revokeObjectURL(a.href);
    }

    /**
     * Generates and downloads a TIFF world file (.tfw) for a DEM tile given its
     * projected bbox and native pixel size in US survey feet.
     * @param {number[]} projBbox    - [minX, minY, maxX, maxY] in EPSG:3089 (US survey feet)
     * @param {number}   pixelSizeFt - Native pixel size in US survey feet
     * @param {string}   filename    - Download filename (e.g. "N081E279.tfw")
     */
    function downloadDemTfw(projBbox, pixelSizeFt, filename) {
        const [minX, minY, maxX, maxY] = projBbox;
        const tfw = [
            pixelSizeFt.toFixed(10),
            '0.0000000000',
            '0.0000000000',
            (-pixelSizeFt).toFixed(10),
            (minX + pixelSizeFt / 2).toFixed(10),
            (maxY - pixelSizeFt / 2).toFixed(10)
        ].join('\n');
        downloadFile(tfw, filename);
    }

    // ── URL builders ───────────────────────────────────────────────────────────

    /**
     * Builds a hillshade preview image URL from the kyraster.ky.gov ImageServer.
     * Used as the thumbnail source for DEM collection cards.
     * @param {number[]} bbox    - [minLon, minLat, maxLon, maxLat] in WGS84
     * @param {string}   service - ImageServer service name (from the `services` lookup)
     * @returns {string} Full exportImage URL returning a 200×200 hillshade JPEG/PNG
     */
    function buildHillshadeUrl(bbox, service) {
        const base = `https://kyraster.ky.gov/arcgis/rest/services/ElevationServices/${service}/ImageServer/exportImage`;
        const params = new URLSearchParams({
            bbox: bbox.join(','),
            bboxSR: '4326',
            size: '200,200',
            imageSR: '3089',
            time: '',
            format: 'jpgpng',
            pixelType: 'UNKNOWN',
            interpolation: '+RSP_BilinearInterpolation',
            renderingRule: JSON.stringify({
                rasterFunction: 'Hillshade',
                rasterFunctionArguments: { HillshadeType: 1, ZFactor: 1.0 },
                variableName: 'DEM'
            }),
            f: 'image'
        });
        return `${base}?${params}`;
    }


    // ── Render helpers ─────────────────────────────────────────────────────────

    /**
     * Updates the status bar text. Pass loading=true to prepend a spinner.
     * @param {string}  msg             - Message to display

    function setStatus(msg, loading = false) {

    }

    /**
     * Formats an ISO date string for display (e.g. "Jan 15, 2022").
     * Returns the raw string if it cannot be parsed, or "—" if empty.
     * @param {string} str - ISO 8601 date string
     * @returns {string}
     */
    function formatDate(str) {
        if (!str) return '—';
        const d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    /**
     * Extracts a sortable Date from a STAC feature's properties.
     * Falls back to the Unix epoch if no date fields are present.
     * @param {Object} feature - GeoJSON feature from the STAC API
     * @returns {Date}
     */
    function featureDate(feature) {
        const p = feature.properties || {};
        return new Date(p.datetime || p.start_datetime || 0);
    }

    /**
     * Returns a styled HTML tag span for a STAC collection ID.
     * DEM collections get a blue tag; all others (Lidar/Ortho) get a green tag.
     * @param {string} collection - STAC collection ID (e.g. "dem-phase2")
     * @returns {string} HTML string
     */
    function collectionTag(collection) {
        if (!collection) return '';
        const cls = collection.startsWith('dem') ? 'tag-dem' : 'tag-laz';
        return `<span class="card-collection ${cls}">${collection}</span>`;
    }

    /**
     * Returns an HTML attribute row (label + value) for use inside a card.
     * Returns an empty string if value is null or empty, suppressing blank rows.
     * @param {string} label - Row label text
     * @param {*}      value - Row value; null or "" suppresses the row entirely
     * @returns {string} HTML string
     */
    function attrRow(label, value) {
        if (value == null || value === '') return '';
        return `<div class="attr-row">
            <span class="attr-label">${label}</span>
            <span class="attr-value">${value}</span>
        </div>`;
    }

    /**
     * Escapes a string for safe insertion into HTML text content or attribute values.
     * @param {string} s
     * @returns {string}
     */
    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /**
     * Recursively renders a JSON value as an interactive collapsible tree of HTML.
     * Top-level objects/arrays are expanded by default; nested ones are collapsed.
     * @param {*}             data       - Any JSON-serializable value
     * @param {string|number} [key=null] - Key label for this node (used in recursion)
     * @param {number}        [depth=0]  - Current recursion depth (controls open/closed state)
     * @returns {string} HTML string
     */
    function renderJsonTree(data, key = null, depth = 0) {
        const keyHtml = key !== null
            ? `<span class="j-key">${escHtml(JSON.stringify(key))}</span><span class="jt-punct">: </span>`
            : '';

        if (data === null)             return `<div class="jt-row">${keyHtml}<span class="j-null">null</span></div>`;
        if (typeof data === 'boolean') return `<div class="jt-row">${keyHtml}<span class="j-bool">${data}</span></div>`;
        if (typeof data === 'number')  return `<div class="jt-row">${keyHtml}<span class="j-num">${data}</span></div>`;
        if (typeof data === 'string')  return `<div class="jt-row">${keyHtml}<span class="j-str">${escHtml(JSON.stringify(data))}</span></div>`;

        const isArr = Array.isArray(data);
        const entries = isArr ? data.map((v, i) => [i, v]) : Object.entries(data);
        const [open, close] = isArr ? ['[', ']'] : ['{', '}'];

        if (entries.length === 0) {
            return `<div class="jt-row">${keyHtml}<span class="jt-bracket">${open}${close}</span></div>`;
        }

        const summary = `${keyHtml}<span class="jt-bracket">${open}</span><span class="jt-count">${entries.length} ${isArr ? 'items' : 'keys'}</span><span class="jt-bracket">${close}</span>`;
        const children = entries.map(([k, v]) => renderJsonTree(v, k, depth + 1)).join('');
        const openAttr = depth === 0 ? ' open' : '';

        return `<details class="jt-node"${openAttr}>
            <summary>${summary}</summary>
            <div class="jt-children">${children}</div>
        </details>`;
    }

    /**
     * Wraps a rendered JSON tree in a collapsible debug panel.
     * @param {string} title - Panel heading
     * @param {*}      data  - Any JSON-serializable value to display
     * @returns {string} HTML string
     */
    function debugPanel(title, data) {
        return `<details class="debug-panel" open>
            <summary>${escHtml(title)}</summary>
            <div class="json-tree">${renderJsonTree(data)}</div>
        </details>`;
    }

    /**
     * Determines the user-facing format label for a STAC asset download button.
     * Distinguishes COG from plain GeoTIFF and COPC from plain LAZ based on
     * URL patterns and MIME types.
     * @param {string} key   - Asset key from the STAC item (e.g. "data", "laz")
     * @param {Object} asset - STAC asset object with href and type fields
     * @returns {string} Short format label (e.g. "COG TIFF", "LAZ", "COPC LAZ")
     */
    function assetFormatLabel(key, asset) {
        const type  = (asset.type || '').toLowerCase();
        const href  = (asset.href || '');
        const ext   = getExtension(href);
        const isCog = /s3\.|amazonaws|cloudfront/.test(href);

        const isCopc = type.includes('copc') || key.toLowerCase().includes('copc') || href.toLowerCase().includes('copc');
        if (type === 'application/vnd.laszip' || ext === 'laz') return isCopc ? 'COPC LAZ' : 'LAZ';
        if (ext === 'las') return isCopc ? 'COPC LAS' : 'LAS';
        if (type.includes('tiff') || type.includes('tif') || ext === 'tif' || ext === 'tiff')
            return isCog ? 'COG TIFF' : 'GeoTIFF';
        if (type === 'application/geo+json' || ext === 'geojson') return 'GeoJSON';
        if (ext === 'jpg' || ext === 'jpeg') return 'JPEG';
        return key.toUpperCase(); // fallback: use the asset key itself
    }

    /**
     * Builds the HTML download links bar for a STAC item's assets.
     * Filters to known downloadable MIME types first; falls back to all non-thumbnail,
     * non-PNG assets if none match. Appends any caller-supplied extra link HTML.
     * @param {Object}   assets          - STAC item assets object
     * @param {string[]} [extraLinks=[]] - Additional HTML link strings to append
     * @returns {string} HTML string, or "" if no downloadable assets are found
     */
    function downloadLinks(assets, extraLinks = []) {
        let entries = Object.entries(assets || {})
            .filter(([key, asset]) =>
                !SKIP_ASSET_KEYS.has(key) &&
                (DOWNLOAD_ASSET_TYPES.has(asset.type) || key === 'data' || key === 'laz' || key === 'tif' || key === 'geotiff')
            );

        if (!entries.length) {
            entries = Object.entries(assets || {})
                .filter(([key, asset]) => {
                    if (SKIP_ASSET_KEYS.has(key) || key === 'thumbnail') return false;
                    return getExtension(asset.href || '') !== 'png';
                });
        }

        if (!entries.length) return '';

        const links = entries.map(([key, asset]) => {
            if (key !== 'metadata') return `<a class="dl-link" href="${asset.href}" target="_blank" rel="noopener">&#8595; ${assetFormatLabel(key, asset)}</a>`;
        }).join('');

        const tfwEntry = Object.values(assets).find(a => a?.href && a.href.split('?')[0].toLowerCase().endsWith('.tfw'));
        const tfwLink = tfwEntry
            ? `<a class="dl-link" href="${tfwEntry.href}" target="_blank" rel="noopener">&#8595; TFW</a>`
            : '';

        return `<div class="card-downloads">${links}${tfwLink}${(extraLinks || []).join('')}</div>`;
    }

    /**
     * Handles a broken card thumbnail by replacing the img element with a
     * "No Preview Available" placeholder. Called via the img element's onerror attribute.
     * @param {HTMLImageElement} el - The img element that failed to load
     */
    function imgError(el) {
        const target = el.closest('.card-thumb-wrap') || el;
        target.outerHTML = '<div class="card-thumb-placeholder"><span class="placeholder-icon">&#128247;</span>No Preview Available</div>';
    }

    // ── Card renderers ─────────────────────────────────────────────────────────

    /**
     * Renders a full result card for a single STAC item (Lidar, DEM, or Ortho).
     * Thumbnails use the COG preview API for imagery collections, or a hillshade
     * generated from the kyraster ImageServer for DEM collections.
     * Includes metadata attributes and download links.
     * @param {Object} feature - GeoJSON feature from the STAC API response
     * @returns {string} HTML string for a .card element
     */
    function stacCard(feature) {
        const p = feature.properties || {};
        const date = formatDate(p.datetime || p.start_datetime);
        const hasThumbnail = feature.assets?.thumbnail && !feature.collection.includes('dem');
        const href = feature.assets?.data?.href || feature.assets?.image?.href || feature.assets?.asset?.href || '';
        const thumbSrc = hasThumbnail
            ? `${CONFIG.cogPreviewApi}/cog/preview/200x200.jpg?url=${encodeURIComponent(href)}&max_size=100&color_formula=sigmoidal rgb 5 0.2, gamma rgb 1.2, saturation 2`
            : (services[feature.collection] ? buildHillshadeUrl(feature.bbox, services[feature.collection]) : null);

        const thumb = thumbSrc
            ? `<div class="card-thumb-wrap"><div class="card-thumb-spinner"><div class="spinner"></div></div><img class="card-thumb" src="${thumbSrc}" alt="${feature.id}" loading="lazy" onload="this.previousElementSibling.remove()" onerror="imgError(this)"></div>`
            : `<div class="card-thumb-placeholder">&#9974;</div>`;

        return `<div class="card">
            ${thumb}
            <div class="card-body">
                <div class="card-title">${collectionLabels[feature.collection] || feature.collection}</div>
                <div class="card-subtitle">${feature.id}</div>
                <div class="card-attrs">
                    ${attrRow('Date', date)}
                    ${attrRow('GSD', p.gsd ? p.gsd + ' m' : null)}
                    ${attrRow('Platform', p.platform)}
                    ${attrRow('Instrument', p.instruments?.join(', '))}
                    ${attrRow('EPSG', p['proj:epsg'] ?? 3089)}
                    ${attrRow('Cloud %', p['eo:cloud_cover'] != null ? p['eo:cloud_cover'] + '%' : null)}
                </div>
                ${(() => {
                    const pxFt = nativeResolutionFt[feature.collection];
                    const projBbox = p['proj:bbox'];
                    const tfwBtn = (pxFt && projBbox)
                        ? `<button class="dl-link" onclick='downloadDemTfw(${JSON.stringify(projBbox)}, ${pxFt}, "${feature.id.replace('.tif', '.tfw')}")'>&#8595; TFW</button>`
                        : '';
                    return downloadLinks(feature.assets, tfwBtn ? [tfwBtn] : []);
                })()}
            </div>
        </div>`;
    }

    /**
     * Renders a result card for a single oblique imagery shot.
     * Returns an empty string if data is null (direction not available for this location).
     * @param {Object|null} data     - Oblique shot data object from the GetObliqueCentroids API
     * @param {string}      dirLabel - Cardinal direction label ("North", "South", etc.)
     * @returns {string} HTML string for a .card element, or ""
     */
    function obliqueCard(data, dirLabel) {
        if (!data) return '';

        const thumbUrl = data.S3URL
            ? `${CONFIG.cogPreviewApi}/cog/preview/200x200.jpg?url=${encodeURIComponent(data.S3URL)}&max_size=100`
            : null;

        const thumb = thumbUrl
            ? `<div class="card-thumb-wrap"><div class="card-thumb-spinner"><div class="spinner"></div></div><img class="card-thumb" src="${thumbUrl}" alt="${data.ShotID || dirLabel}" loading="lazy" onload="this.previousElementSibling.remove()" onerror="imgError(this)"></div>`
            : `<div class="card-thumb-placeholder"><span class="placeholder-icon">&#128247;</span>No Preview Available</div>`;

        const dlLink = data.S3URL
            ? `<div class="card-downloads"><a class="dl-link" href="${data.S3URL}" target="_blank" rel="noopener">&#8595; TIFF</a></div>`
            : '';

        const label = dirLabel || data.Direction || 'oblique';
        const obliqueFilename = data.S3URL ? getFilename(data.S3URL) : (data.ShotID || '');

        return `<div class="card">
            ${thumb}
            <div class="card-body">
                <div class="card-title">${label}</div>
                <div class="card-subtitle">${obliqueFilename}</div>
                <div class="card-attrs">
                    ${attrRow('Date', formatDate(data.FlightDate))}
                    ${attrRow('Flight Line', data.FlightLine)}
                    ${attrRow('Camera', data.Camera)}
                    ${attrRow('Altitude', data.Altitude ? data.Altitude + ' ft' : null)}
                    ${attrRow('GSD', data.GSD ? data.GSD + ' in' : null)}
                </div>
                ${dlLink}
            </div>
        </div>`;
    }

    /**
     * Renders all directional oblique cards for a single oblique result item.
     * Tries North/South/East/West sub-objects first; falls back to rendering
     * the item itself if no direction sub-objects are found.
     * @param {Object} item - A single oblique result object from the API
     * @returns {string} Concatenated HTML for all available direction cards
     */
    function obliqueDirectionCards(item) {
        const dirCards = OBLIQUE_DIRS.map(dir => obliqueCard(item[dir], dir)).join('');
        return dirCards.trim() ? dirCards : obliqueCard(item, item.Direction);
    }

    /**
     * Renders the static About/info panel into the output area.
     * Describes how to use the tool, what APIs are queried, and history features.
     */
    function renderInfo() {
        outputDiv.innerHTML = `
        <div class="info-grid">
            <div class="info-card">

                <ul>

                    <li>Click the <strong>Clear History</strong> button to remove all cached results.</li>
                    <li>Click the <strong>GeoJSON</strong> button to download all queried tile footprints with asset links as a GeoJSON file.</li>

                <div class="info-note">Data coverage and availability varies by phase and county. Not all tile types will appear for every location.</div>

    /**
     * Renders the main results view: STAC catalog item cards, oblique imagery cards,
     * and collapsible API response debug panels.
     * Ortho phase-1 tiles can appear in two overlapping tile grids at different resolutions;
     * when both are present, the _6 (6-inch) variant is kept and the other is dropped.
     * Saves the rendered HTML so it can be restored after toggling the About panel.
     * @param {Object} stacData    - Parsed STAC API FeatureCollection response
     * @param {Object} obliqueData - Parsed GetObliqueCentroids API response
     * @returns {{ stacFeatures: Array, obliqueDirCount: number }}
     */
    function renderResults(stacData, obliqueData) {
        const stacFeatures = (stacData.features || [])
            .slice()
            .sort((a, b) => featureDate(a) - featureDate(b));

        let ck = null;
        if (stacFeatures.length >= 2 && stacFeatures[0].collection === 'orthos-phase1' && stacFeatures[1].collection === 'orthos-phase1') {
            if (stacFeatures[0].id.includes('_6')) {
                ck = 1;
            } else if (stacFeatures[1].id.includes('_6')) {
                ck = 0;
            }
            if (ck !== null) stacFeatures.splice(ck, 1);
        }

        const obliqueValue    = obliqueData.results?.[0]?.value || {};
        const obliqueDirCount = OBLIQUE_DIRS.filter(d => obliqueValue[d]).length;

        infoBtn.style.display = '';
        showingInfo = false;
        infoBtn.textContent = 'About';
        outputDiv.innerHTML = `
        <section>
            <div class="section-header">
                <span class="section-title">Elevation &amp; Imagery Items</span>
                <span class="count-badge">${stacFeatures.length} Downloads</span>
            </div>
            <div class="card-grid">
                ${stacFeatures.map(stacCard).join('') || '<p class="empty-state">No items found.</p>'}
            </div>
        </section>
        <section>
            <div class="section-header">
                <span class="section-title">Closest Oblique Imagery</span>
                <span class="count-badge">${obliqueDirCount} Downloads</span>
            </div>
            <div class="card-grid">
                ${OBLIQUE_DIRS.map(dir => obliqueCard(obliqueValue[dir], dir)).join('') || '<p class="empty-state">No oblique imagery found.</p>'}
            </div>
        </section>
        <section class="debug-section">
            <div class="section-header">
                <span class="section-title">API responses</span>
            </div>
            ${debugPanel('STAC response', stacData)}
            ${debugPanel('Oblique service response', obliqueData)}
        </section>`;

        lastResultsHTML = outputDiv.innerHTML;
        return { stacFeatures, obliqueDirCount };
    }

    // ── History / cache ────────────────────────────────────────────────────────

    /**
     * Loads the full query history array from localStorage.
     * Returns an empty array if storage is empty or the stored data is corrupt.
     * @returns {Array<{id: number, lat: number, lon: number, stacData: Object, obliqueData: Object}>}
     */
    function loadHistory() {
        try { return JSON.parse(localStorage.getItem(CONFIG.historyKey) || '[]'); }
        catch { return []; }
    }

    /**
     * Appends a new query result to localStorage history and refreshes the toolbar buttons.
     * @param {number} lat         - Latitude searched
     * @param {number} lon         - Longitude searched
     * @param {Object} stacData    - STAC API response to cache
     * @param {Object} obliqueData - Oblique API response to cache
     */
    function saveToHistory(lat, lon, stacData, obliqueData) {
        const history = loadHistory();
        history.push({ id: Date.now(), lat, lon, stacData, obliqueData });
        localStorage.setItem(CONFIG.historyKey, JSON.stringify(history));
        refreshClearBtn();
    }

    /**
     * Removes all query history from localStorage, clears history map layers,
     * and hides the Clear History and GeoJSON download buttons.
     */
    function clearHistory() {
        localStorage.removeItem(CONFIG.historyKey);
        historyLayer.clearLayers();
        bboxLayer.clearLayers();
        window.history.replaceState(null, '', window.location.pathname);
        refreshClearBtn();
    }

    /**
     * Shows or hides the Clear History and GeoJSON buttons based on whether
     * any history entries exist in localStorage.
     */
    function refreshClearBtn() {
        const hasHistory = loadHistory().length > 0;
        clearHistoryBtn.style.display    = hasHistory ? '' : 'none';
        downloadGeoJsonBtn.style.display = hasHistory ? '' : 'none';
    }

    /**
     * Searches all cached history entries and returns the first one whose STAC tile
     * bboxes contain the given point. Used to avoid re-querying an already-searched location.
     * @param {number} lat - Latitude to look up
     * @param {number} lon - Longitude to look up
     * @returns {Object|null} Matching history entry, or null if not cached
     */
    function findCachedEntry(lat, lon) {
        for (const entry of loadHistory()) {
            for (const f of (entry.stacData?.features || [])) {
                if (!f.bbox) continue;
                const [minX, minY, maxX, maxY] = f.bbox;
                if (lon >= minX && lon <= maxX && lat >= minY && lat <= maxY) {
                    return entry;
                }
            }
        }
        return null;
    }

    /**
     * Restores a previously cached query: repositions the map and marker,
     * re-renders result cards, redraws bboxes, and updates the URL and status bar.
     * @param {Object} entry - A history entry returned by loadHistory()
     */
    function restoreEntry(entry) {
        placeMarker(entry.lat, entry.lon);
        map.panTo([entry.lat, entry.lon], { animate: false });
        latlonInput.value = `${entry.lat}, ${entry.lon}`;
        window.history.replaceState(null, '', `?lat=${entry.lat}&lon=${entry.lon}`);
        renderResults(entry.stacData, entry.obliqueData);
        drawBboxes(entry.stacData?.features || []);
        setStatus(`Restored query from ${new Date(entry.id).toLocaleString()}.`);
    }

    // ── Search ─────────────────────────────────────────────────────────────────

    /**
     * Runs a catalog search for the given coordinates, querying the STAC API and
     * the GetObliqueCentroids service in parallel. Both requests are independent —
     * a failure in one does not block the other.
     * If a second search arrives while one is already in-flight, it is queued and
     * run immediately after the first completes (last-write-wins).
     * @param {number} lat - Latitude in decimal degrees
     * @param {number} lon - Longitude in decimal degrees
     */
    async function runSearch(lat, lon) {
        lat = parseFloat(lat).toFixed(6);
        lon = parseFloat(lon).toFixed(6);

        if (searching) {
            pendingSearch = { lat, lon };
            return;
        }

        searching = true;
        submitBtn.disabled = true;
        outputDiv.innerHTML = '';
        setStatus('Searching catalog…', true);
        history.replaceState(null, '', `?lat=${lat}&lon=${lon}`);
        latlonInput.value = `${lat}, ${lon}`;

        try {
            const [stacResponse, obliqueResponse] = await Promise.allSettled([
                fetch(`${CONFIG.stacApi}/search?intersects={"type":"Point","coordinates":[${lon},${lat}]}`),
                fetch(`${CONFIG.obliqueApi}/execute?latitude=${lat}&longitude=${lon}&f=json`)
            ]);

            let stacData    = { features: [] };
            let obliqueData = { results: [] };

            if (stacResponse.status === 'fulfilled') {
                const r = stacResponse.value;
                if (!r.ok) {
                    console.warn(`STAC API returned ${r.status}`);
                } else {
                    try {
                        const json = await r.json();
                        if (Array.isArray(json?.features)) stacData = json;
                        else console.warn('Unexpected STAC response shape', json);
                    } catch { console.warn('Failed to parse STAC response'); }
                }
            } else {
                console.warn('STAC fetch failed:', stacResponse.reason);
            }

            if (obliqueResponse.status === 'fulfilled') {
                const r = obliqueResponse.value;
                if (!r.ok) {
                    console.warn(`Oblique API returned ${r.status}`);
                } else {
                    try {
                        const json = await r.json();
                        if (json?.results != null) obliqueData = json;
                        else console.warn('Unexpected oblique response shape', json);
                    } catch { console.warn('Failed to parse oblique response'); }
                }
            } else {
                console.warn('Oblique fetch failed:', obliqueResponse.reason);
            }

            if (!stacData.features.length && !obliqueData.results?.length) {
                setStatus('No data found for this location.');
                outputDiv.innerHTML = '<p class="empty-state">No catalog items or oblique imagery found for this location.</p>';
                return;
            }

            const { stacFeatures, obliqueDirCount } = renderResults(stacData, obliqueData);
            drawBboxes(stacFeatures);
            saveToHistory(lat, lon, stacData, obliqueData);
            drawHistoryBboxes();
            setStatus(`Found ${stacFeatures.length} catalog items and ${obliqueDirCount} oblique shots.`);

        } catch (err) {
            console.error(err);
            setStatus(`Search failed — ${err.message}`);
            if (err.message.includes('Failed to fetch')) {
                outputDiv.innerHTML = '<p class="empty-state">Network error: failed to reach the API. Check your connection and try again.</p>';
            } else if (err.message.includes('quota')) {
                outputDiv.innerHTML = `<p class="empty-state font-size-lg">Likely your browser has exceeded its local storage capacity. Download the GeoJSON to save results and then Clear History.</p>`;

            } else   {
                outputDiv.innerHTML = '<p class="empty-state">An unexpected error occurred. Check the console for details.</p>';
            }
        } finally {
            searching = false;
            submitBtn.disabled = false;

            // Run any queued search — check cache first so a double-tap on the same
            // spot doesn't re-query the API or duplicate history entries.
            if (pendingSearch) {
                const { lat: pLat, lon: pLon } = pendingSearch;
                pendingSearch = null;
                const cached = findCachedEntry(parseFloat(pLat), parseFloat(pLon));
                if (cached) restoreEntry(cached);
                else runSearch(pLat, pLon);
            }
        }
    }

    // ── Map resize handle ──────────────────────────────────────────────────────
    // Allows the user to drag the bar between the map and results panel to
    // adjust how much vertical space each gets.
    const mapEl  = document.getElementById('map');
    const handle = document.getElementById('map-resize-handle');

    handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const startY = e.clientY;
        const startH = mapEl.offsetHeight;
        handle.classList.add('dragging');

        function onMove(e) {
            const h = Math.min(CONFIG.mapMaxHeight, Math.max(CONFIG.mapMinHeight, startH + e.clientY - startY));
            mapEl.style.height = h + 'px';
            map.invalidateSize();
        }

        function onUp() {
            handle.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });

    // ── Event handlers ─────────────────────────────────────────────────────────

    // Map click: validate the point is in Kentucky, then search or restore from cache
    map.on('click', async (e) => {
        const [lat, lng] = await checkCoords(`${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`);
        if (!lat || !lng) {
            setStatus('Click within Kentucky to query.');
            return;
        }
        if (!await isInKentucky(lat, lng)) {
            setStatus('That location is outside Kentucky — click within the state boundary.');
            return;
        }
        latlonInput.value = `${lat}, ${lng}`;
        placeMarker(lat, lng);
        const cached = findCachedEntry(parseFloat(lat), parseFloat(lng));
        if (cached) restoreEntry(cached);
        else runSearch(parseFloat(lat), parseFloat(lng));
    });

    // Search form: parse and validate coords, then search or restore from cache
    submitBtn.addEventListener('click', async () => {
        const [lat, lon] = await checkCoords(latlonInput.value);
        if (!lat || !lon || isNaN(lat) || isNaN(lon)) {
            setStatus('Could not resolve coordinates — enter a valid KY lat/lon, tile name, or EPSG:3089 pair.');
            return;
        }
        if (!await isInKentucky(lat, lon)) {
            setStatus('Those coordinates are outside Kentucky.');
            return;
        }
        placeMarker(lat, lon);
        map.panTo([lat, lon]);
        runSearch(lat, lon);
    });

    // Clear all cached query history from localStorage and remove map overlays
    clearHistoryBtn.addEventListener('click', () => {
        clearHistory();
        setStatus('Query history cleared.');
    });

    // Export all cached queries as a GeoJSON FeatureCollection.
    // Each Feature represents one query location; its geometry is a bbox Polygon
    // covering all STAC tiles returned for that search. Properties contain a nested
    // stac_items array (one object per tile with asset download URLs) and an oblique
    // object keyed by cardinal direction (North/South/East/West).
    downloadGeoJsonBtn.addEventListener('click', () => {
        const features = loadHistory().map(entry => {
            const stacFeatures = entry.stacData?.features || [];

            // Compute the union bbox across all STAC tiles for this query
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const f of stacFeatures) {
                if (!f.bbox) continue;
                const [x0, y0, x1, y1] = f.bbox;
                if (x0 < minX) minX = x0;
                if (y0 < minY) minY = y0;
                if (x1 > maxX) maxX = x1;
                if (y1 > maxY) maxY = y1;
            }
            const hasBbox = isFinite(minX);
            const stacLinks = {};
            // One object per STAC tile: key metadata + flat asset URL map
            const stacItems = stacFeatures.map(f => ({
                id:               f.id,
                collection:       f.collection,
                collection_label: collectionLabels[f.collection] || f.collection,
                datetime:         f.properties?.datetime || null,
                
                assets: Object.fromEntries(
                    Object.entries(f.assets || {})
                        .filter(([, a]) => a?.href)
                        .map(([k, a]) => {
                            if (!SKIP_ASSET_KEYS.has(k)) {
                                const label = assetFormatLabel(k, a);
                                stacLinks[`${f.id} ${label}`] = a.href;
                            }
                            return [k, a.href];
                        })
                ),
                raw:              f,
                tilename:         f.id.split('_')[0] 
            }));

            // One object per available cardinal direction
            const obliqueValue = entry.obliqueData?.results?.[0]?.value || {};
            const oblique = {};
            const obliqueLinks = {};
            for (const dir of OBLIQUE_DIRS) {
                const shot = obliqueValue[dir];
                if (!shot) continue;
                oblique[dir] = {
                    url:         shot.S3URL    || null,
                    shot_id:     shot.ShotID   || null,
                    flight_date: new Date(shot.FlightDate) || null,
                    raw:         shot
                    // flight_line: shot.FlightLine || null,
                    // camera:      shot.Camera    || null,
                    // altitude_ft: shot.Altitude  || null,
                    // gsd_in:      shot.GSD       || null
                };
                if (shot.S3URL) {
                    obliqueLinks[`${dir}`] = shot.S3URL;
                }
            }

            return {
                type: 'Feature',
                // ...(hasBbox ? { bbox: [minX, minY, maxX, maxY] } : {}),
                geometry: hasBbox
                    ? { type: 'Polygon', coordinates: [[[minX, minY], [maxX, minY], [maxX, maxY], [minX, maxY], [minX, minY]]] }
                    : { type: 'Point', coordinates: [entry.lon, entry.lat] },
                properties: {
                    // lat:        entry.lat,
                    // lon:        entry.lon,
                    tilename:    stacItems[0]?.tilename || null,
                    clicked_lat_lon: [Number(entry.lat), Number(entry.lon)],
                    queried_at: new Date(entry.id).toISOString(),
                    ...stacLinks,
                    ...obliqueLinks,
                    // oblique_items: oblique,
                    // stac_items: stacItems,
                    
                }
            };
        });

        const geojson = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/geo+json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = buildGeoJsonFilename(features.length);
        a.click();
        URL.revokeObjectURL(a.href);
    });

    // Toggle between the About/info panel and the last search results
    infoBtn.addEventListener('click', () => {
        if (showingInfo) {
            outputDiv.innerHTML = lastResultsHTML;
            infoBtn.textContent = 'About';
            showingInfo = false;
        } else {
            renderInfo();
            infoBtn.textContent = 'Results';
            showingInfo = true;
        }
    });

    // ── Initialization ─────────────────────────────────────────────────────────

    drawHistoryBboxes();
    refreshClearBtn();

    // On load, zoom to the extent of all previously queried areas if history exists
    const allBboxes = loadHistory().flatMap(e => (e.stacData?.features || []).map(f => f.bbox).filter(Boolean));
    if (allBboxes.length) {
        const bounds = L.latLngBounds(allBboxes.map(([minX, minY, maxX, maxY]) => [[minY, minX], [maxY, maxX]]));
        map.fitBounds(bounds, { padding: [20, 20], animate: false });
    }

    // If lat/lon URL params are present, jump to that location and run (or restore) a search
    const sp = new URLSearchParams(location.search);
    const initLat = parseFloat(sp.get('lat'));
    const initLon = parseFloat(sp.get('lon'));
    if (!isNaN(initLat) && !isNaN(initLon)) {
        latlonInput.value = `${initLat}, ${initLon}`;
        placeMarker(initLat, initLon);
        map.setView([initLat, initLon], 12, { animate: false });
        const cached = findCachedEntry(initLat, initLon);
        if (cached) restoreEntry(cached);
        else runSearch(initLat, initLon);
    } else {
        renderInfo();
        showingInfo = true;
    }
</script>
</body>
</html>
